<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expire Tabs</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header>
      <h1>Tabs Zero</h1>
      <span class="tab-count" id="tab-count"></span>
    </header>

    <section class="auto-expire" id="auto-expire-section">
      <label class="auto-expire-toggle">
        <span class="toggle-track" id="toggle-track">
          <input type="checkbox" id="auto-expire-checkbox">
          <span class="toggle-slider"></span>
        </span>
        <span class="auto-expire-text">
          <span class="auto-expire-label">Auto-expire</span>
          <span class="auto-expire-status-line">
            <span class="auto-expire-status" id="auto-expire-status">Off</span>
            <span class="next-run" id="next-run"></span>
          </span>
        </span>
      </label>
      <div class="auto-expire-config" id="auto-expire-config">
        <div class="auto-expire-config-inner">
          <div class="config-row">
            <span>Close tabs idle for</span>
            <select id="auto-expire-threshold">
              <option value="0.125">3 hours</option>
              <option value="0.25">6 hours</option>
              <option value="0.5">12 hours</option>
              <option value="1">1 day</option>
              <option value="3">3 days</option>
              <option value="7" selected>7 days</option>
              <option value="14">14 days</option>
              <option value="30">30 days</option>
            </select>
          </div>
          <label class="config-check">
            <input type="checkbox" id="aggressive-duplicates" checked>
            <span>Close duplicate tabs twice as fast</span>
          </label>
          <span class="changes-applied" id="changes-applied"></span>
        </div>
      </div>
    </section>

    <section class="idle-tabs" id="idle-tabs">
      <p class="empty-message" id="empty-message" style="display:none">No idle tabs.</p>
    </section>


  </div>
  <script src="popup.js"></script>
</body>
</html>
